<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A Message For You</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Times New Roman', Times, serif, sans-serif;
            background-color: #fdf6f0;
        }

        .card {
            background: white;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: #e63939;
            font-size: 36px;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            color: #333333;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            border: none;
            background-color: #9d4545;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #7a3535;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>I'm Sorry 🩵</h1>
        <p>
            I am really sorry "BOPPANI VINEELA" for hurting you. I truly value you and I regret what happened.
            Please forgive me.
        </p>
        <button onclick="alert('Thank you for reading ❤️')">Click Me</button>
    </div>
</body>
</html>
